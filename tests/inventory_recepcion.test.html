<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recepción paquetes — tests</title>
    <style>
      body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; padding: 16px; }
      .ok { color: #16a34a; font-weight: 900; }
      .bad { color: #dc2626; font-weight: 900; }
      pre { background: #0b1020; color: #e5e7eb; padding: 12px; border-radius: 12px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Recepción paquetes — tests</h1>
    <div id="out">Ejecutando…</div>
    <pre id="log"></pre>

    <script type="module">
      import { validateBarcode } from "../scanner_utils.js";

      const out = document.getElementById("out");
      const log = document.getElementById("log");
      const lines = [];

      function assert(cond, msg) {
        if (!cond) throw new Error(msg);
      }

      try {
        const okEan13 = validateBarcode("5901234123457", { allowLib: false });
        assert(okEan13.ok === true, "EAN-13 válido");
        const badEan13 = validateBarcode("5901234123458", { allowLib: false });
        assert(badEan13.ok === false, "EAN-13 inválido checksum");
        const okEan8 = validateBarcode("96385074", { allowLib: false });
        assert(okEan8.ok === true, "EAN-8 válido");
        const okUpc = validateBarcode("036000291452", { allowLib: false });
        assert(okUpc.ok === true, "UPC-A válido");
        lines.push("OK  validateBarcode EAN/UPC");

        const packs = 3;
        const upp = 12;
        const units = packs * upp;
        assert(units === 36, "cálculo unidades");
        lines.push("OK  cálculo packs*upp");

        out.textContent = "✅ Todos los tests pasaron";
        out.className = "ok";
      } catch (e) {
        out.textContent = "❌ Falló";
        out.className = "bad";
        lines.push("ERR " + (e?.message || String(e)));
      }

      log.textContent = lines.join("\n");
    </script>
  </body>
</html>
