<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Escáner móvil</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-white min-h-screen">
    <div class="max-w-xl mx-auto p-4">
      <div class="flex items-center gap-3 mb-4">
        <img src="virgen.png" class="w-10 h-10 rounded-xl bg-white p-1 border border-slate-800" onerror="this.style.display='none'">
        <div>
          <div class="font-black tracking-wide">LIBRERÍA</div>
          <div class="text-xs text-slate-300 tracking-widest">ESCÁNER MÓVIL</div>
        </div>
      </div>

      <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 mb-3">
        <div class="text-xs text-slate-400 font-mono">Sesión</div>
        <div class="text-2xl font-black" id="sess">—</div>
        <div class="text-xs text-slate-400 mt-2">Estado: <span id="st" class="font-mono">inactivo</span></div>
      </div>

      <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 mb-3">
        <div class="text-sm font-bold mb-2">Conectar</div>
        <div class="flex gap-2">
          <input id="code" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800 font-mono" placeholder="Código sesión (6 dígitos)">
          <button id="btnConnect" class="px-4 py-2 rounded-xl bg-emerald-600 font-black">OK</button>
        </div>
        <div class="mt-2 text-xs text-slate-400">Si la cámara no está disponible, puedes pegar el código aquí y enviar manual.</div>
      </div>

      <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 mb-3">
        <div class="flex items-center justify-between mb-2">
          <div class="text-sm font-bold">Cámara</div>
          <button id="btnCam" class="px-3 py-2 rounded-xl bg-slate-800 font-mono text-xs">Iniciar</button>
        </div>
        <video id="v" class="w-full rounded-xl bg-black border border-slate-800" playsinline muted></video>
        <canvas id="c" class="hidden"></canvas>
        <div class="mt-2 text-xs text-slate-400">Permite acceso a la cámara. Recomendado: cámara trasera.</div>
      </div>

      <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-4">
        <div class="text-sm font-bold mb-2">Último</div>
        <div id="last" class="font-mono text-lg">—</div>
        <div class="mt-3 flex gap-2">
          <input id="manual" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800 font-mono" placeholder="Ingresar/pegar código">
          <button id="btnSend" class="px-4 py-2 rounded-xl bg-indigo-600 font-black">Enviar</button>
        </div>
        <div class="mt-2 text-xs text-slate-400">Buffer offline: si se va la conexión, se reintenta al volver.</div>
      </div>
    </div>

    <script type="module" src="scan.js?v=20260427c"></script>
  </body>
</html>
